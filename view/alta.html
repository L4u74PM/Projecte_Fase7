   <main>
    <header class="page-header">
        <h1>Alta de Nou Node Edge</h1>
        <p>Afegeix un nou dispositiu a la xarxa descentralitzada.</p>
    </header>

    <section class="form-section">
        <form id="form-alta">
            <div class="form-group">
                <label for="nom">Nom del Dispositiu</label>
                <input type="text" id="nom" placeholder="Ex: Servidor Local BCN" required>
            </div>

            <div class="form-group">
                <label for="lloc">Ubicació (Ciutat)</label>
                <select id="lloc" required>
                    <option value="">-- Selecciona una ciutat --</option>
                    <option value="Barcelona">Barcelona</option>
                    <option value="Girona">Girona</option>
                    <option value="Tarragona">Tarragona</option>
                    <option value="Lleida">Lleida</option>
                    <option value="Manresa">Manresa</option>
                    <option value="Terrassa">Terrassa</option>
                    <option value="Sabadell">Sabadell</option>
                    <option value="Mataró">Mataró</option>
                    <option value="Reus">Reus</option>
                    <option value="Salt">Salt</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tipus">Tipus de Hardware (Sostenibilitat)</label>
                <select id="tipus" required>
                    <option value="reutilitzat">PC Reutilitzat (Economia Circular)</option>
                    <option value="raspberry">Raspberry Pi / MicroNode (Baix Consum)</option>
                    <option value="sensor">Sensor Mediambiental IoT</option>
                </select>
            </div>

            <div class="form-group">
                <label for="email">Email de l'Administrador</label>
                <input type="email" id="email" placeholder="admin@edgeeco.com" required>
            </div>

          <button type="submit" id="btn-enviar">Registrar Node</button>
        </form>

        <div id="missatge-estat"></div>
    </section>
</main>
